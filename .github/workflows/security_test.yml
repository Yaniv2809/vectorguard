name: VectorGuard Security CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Run Red-Teaming Tests (Pytest)
      run: |
        # הערה: בסביבת CI חינמית אין לנו Ollama רץ. 
        # בפרודקשן אמיתי היינו מרימים קונטיינר של Ollama, או משתמשים ב-Mock לטסט ה-PII.
        # בינתיים, נריץ את הטסטים שבודקים את מסד הנתונים הוקטורי (Isolation & Poisoning).
        pytest tests/test_tenant_isolation.py -v
