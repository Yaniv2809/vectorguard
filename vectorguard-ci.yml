name: VectorGuard CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  security-tests:
    name: Run VectorGuard Test Suite
    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/healthz"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for Qdrant to be ready
        run: |
          for i in {1..20}; do
            curl -sf http://localhost:6333/healthz && break
            echo "Waiting for Qdrant... ($i)"
            sleep 3
          done

      - name: Run VectorGuard tests
        env:
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
        run: pytest tests/ --alluredir=reports/ -v

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: reports/

  supply-chain-audit:
    name: Supply Chain Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt
