version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: vectorguard-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  vectorguard-tests:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: vectorguard-runner
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    volumes:
      - ../reports:/app/reports
    command: pytest tests/ --alluredir=reports/ -v

volumes:
  qdrant_data:
